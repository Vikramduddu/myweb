name: Build and Deploy to Tomcat

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package
        #run: mvn clean install -f myweb/pom.xml  

      - name: Get WAR file
        id: war
        run: |
          echo "WAR_FILE=$(ls target/*.war | head -n 1)" >> $GITHUB_ENV  

      - name: Deploy to Tomcat
        run: |
          curl -v -u tomcat:tomcat@123 \
          --upload-file ${{ env.WAR_FILE }} \
          "http://13.60.249.246/manager/text/deploy?path=/myapp&update=true"
